description: A UI for viewing and managing Kubeflow resources in Headlamp.
changes:
  - kind: added
    description: "Katib: Add KatibExperiments, KatibTrials, and KatibSuggestions list and detail views."
  - kind: added
    description: "Katib: Add KatibOverview and RBAC views."
  - kind: added
    description: "Katib: Implement Katib trial log viewer."
  - kind: added
    description: "Katib: Register Katib routes and sidebar entries."
  - kind: added
    description: "Pipelines: Add PipelinesList, PipelinesDetail, PipelineVersions, PipelineExperiments, PipelineRuns, PipelineRecurringRuns, and PipelineArtifacts components."
  - kind: added
    description: "Pipelines: Add centralized log viewer integrated with Pipelines and Notebooks."
  - kind: added
    description: "Common: Add KubeflowConditionsSection, KubeflowJsonSection, KubeflowStatusBadge, and KubeflowTypeBadge shared components."
  - kind: added
    description: "Common: Add Katib formatting utilities and mock data fixtures."
  - kind: added
    description: "Hooks: Add useSubjectAccessReview hook for RBAC checks."
  - kind: changed
    description: "Common: Refactor spec viewers and detail pages to use the activity-based viewer system."
  - kind: changed
    description: "Common: Refactor existing badges to use generic badge components."
  - kind: changed
    description: "Hooks: Update installation check logic."
  - kind: fixed
    description: "Common: Fix newline normalization."
